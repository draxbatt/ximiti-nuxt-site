name: Auto Merge PRs

on:
  pull_request:
    types: [opened, reopened, labeled, synchronize, ready_for_review]

permissions:
  pull-requests: write
  contents: read

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Setup GH CLI
        uses: cli/cli-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for this PR
        run: |
          echo "Enabling auto-merge for PR #${{ github.event.pull_request.number }}"
          gh pr merge ${{ github.event.pull_request.number }} --auto --merge || true
